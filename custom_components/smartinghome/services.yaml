set_mode:
  name: Set HEMS Mode
  description: >-
    Set the Home Energy Management System operating mode.
    Controls battery charge/discharge behavior and grid export strategy.
  fields:
    mode:
      name: Mode
      description: >-
        HEMS operating mode to set.
      required: true
      example: "auto"
      selector:
        select:
          options:
            - "auto"
            - "sell"
            - "charge"
            - "peak_save"
            - "night_arbitrage"
            - "emergency"
            - "manual"

force_charge:
  name: Force Battery Charge
  description: >-
    Force the battery to charge by setting charge current to maximum (18.5A).
    Overrides the current HEMS mode.

force_discharge:
  name: Force Battery Discharge
  description: >-
    Force the battery to discharge by blocking charge current (0A).
    Battery will power the home load and export surplus to grid.

force_custom:
  name: Force Custom Command
  description: >-
    Execute a custom force charge/discharge command with configurable parameters.
    Allows manual testing of different inverter work modes, Modbus values,
    charge currents, and export limits. All parameters are optional.
  fields:
    work_mode:
      name: Work Mode
      description: "Inverter work mode (general, eco_charge, eco_discharge, backup, peak_shaving, eco)"
      required: false
      example: "general"
      selector:
        select:
          options:
            - "general"
            - "eco_charge"
            - "eco_discharge"
            - "backup"
            - "peak_shaving"
            - "eco"
    modbus_47511:
      name: Modbus Register 47511
      description: "EMS Mode register value (-1 = skip, 0-10 = write)"
      required: false
      default: -1
      selector:
        number:
          min: -1
          max: 10
          step: 1
    charge_current:
      name: Charge Current
      description: "Battery charge current in Amps (e.g. '18.5' for max, '0' to block)"
      required: false
      example: "18.5"
      selector:
        text:
    export_limit:
      name: Export Limit
      description: "Grid export limit in Watts (0-16000)"
      required: false
      selector:
        number:
          min: 0
          max: 16000
          step: 500
          unit_of_measurement: W
    eco_mode_power:
      name: Eco Mode Power
      description: "Eco Mode power percentage (0-100%, 100 = full inverter power)"
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 10
          unit_of_measurement: "%"
    eco_mode_soc:
      name: Eco Mode SOC
      description: "Eco Mode target SOC (0-100%, 100 for charge, 5 for discharge)"
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"

set_export_limit:
  name: Set Grid Export Limit
  description: >-
    Set the grid export power limit in Watts.
    GoodWe BT supports up to 16000W via set_parameter.
  fields:
    limit:
      name: Export Limit
      description: "Export limit in Watts (0-16000)"
      required: true
      example: 16000
      selector:
        number:
          min: 0
          max: 16000
          step: 500
          unit_of_measurement: W

ask_ai_advisor:
  name: Ask AI Energy Advisor
  description: >-
    Ask the AI energy advisor a question about your energy system.
    Requires PRO license and a configured AI provider (Google Gemini or Anthropic Claude).
    Response is fired as a smartinghome_ai_response event.
  fields:
    question:
      name: Question
      description: "Your question about the energy system"
      required: true
      example: "Should I export energy to the grid right now?"
      selector:
        text:
    provider:
      name: AI Provider
      description: "AI provider to use (auto selects the best available)"
      required: false
      default: "auto"
      selector:
        select:
          options:
            - "auto"
            - "gemini"
            - "anthropic"

generate_report:
  name: Generate Daily Report
  description: >-
    Generate an AI-powered daily energy report.
    Requires PRO license. Response is fired as a smartinghome_daily_report event.

upload_inverter_image:
  name: Upload Image
  description: >-
    Upload a base64-encoded image to the smartinghome www directory.
    Used for inverter, house, and grid images.
  fields:
    filename:
      name: Filename
      description: "Target filename (e.g. inverter.png, home.png, grid.png)"
      required: true
      example: "inverter.png"
      selector:
        text:
    data:
      name: Base64 Data
      description: "Base64-encoded image data"
      required: true
      selector:
        text:

save_settings:
  name: Save API Settings
  description: >-
    Save API keys for AI providers (Google Gemini, Anthropic Claude).
    Keys are stored in the HA config entry.
  fields:
    gemini_api_key:
      name: Gemini API Key
      description: "Google Gemini API key"
      required: false
      default: ""
      selector:
        text:
    anthropic_api_key:
      name: Anthropic API Key
      description: "Anthropic Claude API key"
      required: false
      default: ""
      selector:
        text:

test_api_key:
  name: Test API Key
  description: >-
    Test if an API key is valid by making a minimal request.
    Results are fired as a smartinghome_api_key_test event.
  fields:
    provider:
      name: Provider
      description: "AI provider to test"
      required: true
      selector:
        select:
          options:
            - "gemini"
            - "anthropic"
    api_key:
      name: API Key
      description: "Optional API key to test (if empty, uses stored key)"
      required: false
      default: ""
      selector:
        text:

save_panel_settings:
  name: Save Panel Settings
  description: >-
    Save panel UI settings to settings.json (PV labels, model selections, etc).
  fields:
    settings:
      name: Settings JSON
      description: "JSON string with settings to save"
      required: true
      selector:
        text:

sync_ecowitt_state:
  name: Sync Ecowitt State
  description: >-
    Sync the Ecowitt integration enabled/disabled state to the HA config entry
    so the coordinator reads the correct state after restart.
  fields:
    enabled:
      name: Enabled
      description: "Whether the Ecowitt integration is enabled"
      required: true
      selector:
        boolean:
