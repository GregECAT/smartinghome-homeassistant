name: HACS & Home Assistant Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    name: Hassfest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest Validation
        uses: home-assistant/actions/hassfest@master

  validate-json:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate JSON files
        run: |
          python -c "
          import json, glob, sys
          files = glob.glob('custom_components/**/*.json', recursive=True)
          files.append('hacs.json')
          errors = []
          for f in files:
              try:
                  json.load(open(f))
                  print(f'✅ {f}')
              except Exception as e:
                  errors.append(f'❌ {f}: {e}')
                  print(f'❌ {f}: {e}')
          if errors:
              sys.exit(1)
          print(f'\nAll {len(files)} JSON files valid.')
          "

  validate-yaml:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate YAML files
        run: |
          python -c "
          import yaml, glob, sys

          # Register HA custom YAML tags so safe_load doesn't crash
          for tag in ['!input', '!include', '!secret', '!env_var']:
              yaml.SafeLoader.add_constructor(tag, lambda loader, node: loader.construct_scalar(node))

          files = glob.glob('custom_components/**/*.yaml', recursive=True)
          errors = []
          for f in files:
              try:
                  with open(f) as fh:
                      list(yaml.safe_load_all(fh))
                  print(f'✅ {f}')
              except Exception as e:
                  errors.append(f'❌ {f}: {e}')
                  print(f'❌ {f}: {e}')
          if errors:
              sys.exit(1)
          print(f'\nAll {len(files)} YAML files valid.')
          "

  lint-python:
    name: Python Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check custom_components/smartinghome/
